<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub - Smart Study Planner</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <h1><i class="fa-solid fa-book"></i> StudyHub</h1>

    <p class="subtitle">
        Organize your study tasks efficiently
    </p>

    <div class="input-section">

        <input
        type="text"
        id="taskInput"
        placeholder="Enter a study task">

        <button onclick="addTask()">
            Add Task
        </button>

    </div>

    <div class="filters">

        <button onclick="showAll()">All</button>

        <button onclick="showPending()">
            Pending
        </button>

        <button onclick="showCompleted()">
            Completed
        </button>

        <button onclick="toggleDarkMode()">
            🌙 Dark Mode
        </button>

    </div>

    <ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
